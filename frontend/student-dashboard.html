<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard — LearnFlow LMS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard-page">

    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="auth-logo" style="margin:0">
          <div class="logo-icon">🎓</div>
          <span class="logo-text">LearnFlow</span>
        </div>
      </div>
      <div class="topbar-right">
        <span class="role-tag student">Student</span>
        <div class="user-chip">
          <div class="user-avatar" id="userInitial">?</div>
          <span class="user-name" id="userName">Loading…</span>
        </div>
        <button class="btn-logout" id="logoutBtn">Sign Out</button>
      </div>
    </header>

    <!-- Main -->
    <main class="main">
      <div class="page-header">
        <h1 class="page-title">Student Dashboard</h1>
        <p class="page-subtitle">Browse and join all available classes.</p>
      </div>

      <!-- Search Bar -->
      <div style="margin-bottom: 32px;">
        <input
          class="form-input"
          type="text"
          id="searchInput"
          placeholder="🔍  Search classes by title or teacher…"
          style="max-width: 480px;"
        />
      </div>

      <!-- Classes List -->
      <div class="classes-section">
        <div class="classes-header">
          <h2 class="section-title" style="margin-bottom:0">Available Classes</h2>
          <span class="classes-count" id="classesCount">Loading…</span>
        </div>

        <div class="classes-grid" id="classesGrid">
          <div class="empty-state" style="grid-column:1/-1">
            <div class="loading-spinner" style="width:32px;height:32px;margin:0 auto 16px;border-width:3px"></div>
            <p>Loading classes…</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Auth guard
    const token = localStorage.getItem('lms_token');
    const user = JSON.parse(localStorage.getItem('lms_user') || 'null');
    if (!token || !user) { window.location.href = 'login.html'; }
    else if (user.role !== 'student') { window.location.href = 'teacher-dashboard.html'; }

    // Populate user info
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userInitial').textContent = user.name.charAt(0).toUpperCase();

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('lms_token');
      localStorage.removeItem('lms_user');
      window.location.href = 'login.html';
    });

    const authHeaders = { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` };

    let allClasses = [];

    function timeAgo(date) {
      const diff = (Date.now() - new Date(date)) / 1000;
      if (diff < 60) return 'Just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderClasses(classes) {
      const grid = document.getElementById('classesGrid');
      document.getElementById('classesCount').textContent =
        `${classes.length} ${classes.length === 1 ? 'class' : 'classes'}`;

      if (classes.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-icon">📭</div>
            <div class="empty-title">No classes found</div>
            <div class="empty-desc">No classes match your search, or none have been created yet.</div>
          </div>`;
        return;
      }

      grid.innerHTML = classes.map((cls, i) => `
        <div class="class-card" style="animation-delay:${i * 0.05}s">
          <div class="card-tag">CLASS</div>
          <div class="card-title">${escapeHtml(cls.title)}</div>
          <div class="card-teacher">
            👤 ${escapeHtml(cls.teacherName)}
            &nbsp;·&nbsp; 🕒 ${timeAgo(cls.createdAt)}
          </div>
          <div class="card-actions">
            <a class="btn-join" href="${escapeHtml(cls.meetingLink)}" target="_blank" rel="noopener">
              🔗 Join Meeting
            </a>
          </div>
        </div>
      `).join('');
    }

    // Fetch all classes
    async function loadClasses() {
      try {
        const res = await fetch('/api/classes/all', { headers: authHeaders });
        if (res.status === 401) { window.location.href = 'login.html'; return; }
        const data = await res.json();
        allClasses = data.classes;
        renderClasses(allClasses);
      } catch (err) {
        document.getElementById('classesGrid').innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-icon">⚠️</div>
            <div class="empty-title">Failed to load classes</div>
            <div class="empty-desc">${err.message}</div>
          </div>`;
      }
    }

    // Live search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = allClasses.filter(cls =>
        cls.title.toLowerCase().includes(q) ||
        cls.teacherName.toLowerCase().includes(q)
      );
      renderClasses(filtered);
    });

    loadClasses();
  </script>
</body>
</html>
