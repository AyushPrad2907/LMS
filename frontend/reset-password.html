<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — LearnFlow LMS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-page">

    <!-- Hero Panel -->
    <div class="auth-hero">
      <div class="hero-badge"><span></span> Set New Password</div>
      <h1 class="hero-title">
        Almost<br /><em>There.</em>
      </h1>
      <p class="hero-desc">
        Choose a new password for your account. Make it something
        secure that you haven't used before.
      </p>
      <div class="hero-stats">
        <div class="stat">
          <span class="stat-num">2k+</span>
          <span class="stat-label">Students</span>
        </div>
        <div class="stat">
          <span class="stat-num">150+</span>
          <span class="stat-label">Teachers</span>
        </div>
        <div class="stat">
          <span class="stat-num">400+</span>
          <span class="stat-label">Classes</span>
        </div>
      </div>
    </div>

    <!-- Form Panel -->
    <div class="auth-panel">
      <div class="auth-card">

        <div class="auth-logo">
          <div class="logo-icon">🎓</div>
          <span class="logo-text">LearnFlow</span>
        </div>

        <h2 class="auth-heading">Create new password</h2>
        <p class="auth-subheading">Enter and confirm your new password below.</p>

        <div class="alert alert-error" id="alertBox">
          <span>⚠️</span><span id="alertMsg"></span>
        </div>
        <div class="alert alert-success" id="successBox">
          <span>✅</span><span id="successMsg"></span>
        </div>

        <form id="resetForm" novalidate>

          <div class="form-group">
            <label class="form-label" for="password">New Password</label>
            <input class="form-input" type="password" id="password" placeholder="Minimum 6 characters" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirm Password</label>
            <input class="form-input" type="password" id="confirmPassword" placeholder="Re-enter new password" required />
          </div>

          <button class="btn-primary" type="submit" id="submitBtn">
            Reset Password
          </button>
        </form>

        <div class="auth-footer">
          Remembered your password? <a href="login.html">Back to Sign in</a>
        </div>

      </div>
    </div>
  </div>

  <script>
    function showError(msg) {
      const el = document.getElementById('alertBox');
      document.getElementById('alertMsg').textContent = msg;
      el.classList.add('show');
      document.getElementById('successBox').classList.remove('show');
    }
    function showSuccess(msg) {
      const el = document.getElementById('successBox');
      document.getElementById('successMsg').textContent = msg;
      el.classList.add('show');
      document.getElementById('alertBox').classList.remove('show');
    }

    // Extract the reset token from the URL, e.g. reset-password.html?token=abc123
    const params = new URLSearchParams(window.location.search);
    const resetToken = params.get('token');

    const form = document.getElementById('resetForm');
    const submitBtn = document.getElementById('submitBtn');

    if (!resetToken) {
      showError('This reset link is missing or invalid. Please request a new one.');
      form.querySelectorAll('input, button').forEach((el) => { el.disabled = true; });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!resetToken) return;

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!password || !confirmPassword) return showError('Please fill in both password fields.');
      if (password.length < 6) return showError('Password must be at least 6 characters.');
      if (password !== confirmPassword) return showError('Passwords do not match.');

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading-spinner"></span> Resetting…';

      try {
        const res = await fetch(`/api/auth/reset-password/${encodeURIComponent(resetToken)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        let data;
        try {
          data = await res.json();
        } catch {
          throw new Error('Server returned an invalid response. Please try again.');
        }

        if (!res.ok) throw new Error(data.message || 'Could not reset password. Please try again.');

        showSuccess(data.message || 'Password reset successful! Redirecting to sign in…');
        form.reset();
        form.querySelectorAll('input, button').forEach((el) => { el.disabled = true; });

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);

      } catch (err) {
        showError(err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
