<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — LearnFlow LMS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-page">

    <!-- Hero Panel -->
    <div class="auth-hero">
      <div class="hero-badge"><span></span> Secure Login</div>
      <h1 class="hero-title">
        Welcome<br /><em>Back.</em>
      </h1>
      <p class="hero-desc">
        Your classroom is waiting. Sign in to continue your learning
        journey or manage your classes.
      </p>
      <div class="hero-stats">
        <div class="stat">
          <span class="stat-num">2k+</span>
          <span class="stat-label">Students</span>
        </div>
        <div class="stat">
          <span class="stat-num">150+</span>
          <span class="stat-label">Teachers</span>
        </div>
        <div class="stat">
          <span class="stat-num">400+</span>
          <span class="stat-label">Classes</span>
        </div>
      </div>
    </div>

    <!-- Form Panel -->
    <div class="auth-panel">
      <div class="auth-card">

        <div class="auth-logo">
          <div class="logo-icon">🎓</div>
          <span class="logo-text">LearnFlow</span>
        </div>

        <h2 class="auth-heading">Sign in</h2>
        <p class="auth-subheading">Enter your credentials to access your dashboard.</p>

        <div class="alert alert-error" id="alertBox">
          <span>⚠️</span><span id="alertMsg"></span>
        </div>
        <div class="alert alert-success" id="successBox">
          <span>✅</span><span id="successMsg"></span>
        </div>

        <form id="loginForm" novalidate>

          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input class="form-input" type="email" id="email" placeholder="jane@example.com" autocomplete="email" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" placeholder="Your password" autocomplete="current-password" required />
          </div>

          <button class="btn-primary" type="submit" id="submitBtn">
            Sign In
          </button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="register.html">Create one</a>
        </div>

      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    const token = localStorage.getItem('lms_token');
    const user = JSON.parse(localStorage.getItem('lms_user') || 'null');
    if (token && user) {
      window.location.href = user.role === 'teacher' ? 'teacher-dashboard.html' : 'student-dashboard.html';
    }

    function showError(msg) {
      const el = document.getElementById('alertBox');
      document.getElementById('alertMsg').textContent = msg;
      el.classList.add('show');
      document.getElementById('successBox').classList.remove('show');
    }
    function showSuccess(msg) {
      const el = document.getElementById('successBox');
      document.getElementById('successMsg').textContent = msg;
      el.classList.add('show');
      document.getElementById('alertBox').classList.remove('show');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) return showError('Please fill in all fields.');

      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span> Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        let data;
        try {
          data = await res.json();
        } catch {
          throw new Error('Server returned an invalid response. Please try again.');
        }

        if (!res.ok) throw new Error(data.message || 'Login failed.');

        localStorage.setItem('lms_token', data.token);
        localStorage.setItem('lms_user', JSON.stringify(data.user));
        showSuccess('Login successful! Redirecting…');

        setTimeout(() => {
          window.location.href = data.user.role === 'teacher' ? 'teacher-dashboard.html' : 'student-dashboard.html';
        }, 800);

      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
